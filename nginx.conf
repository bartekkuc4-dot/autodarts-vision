server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── React Router ─────────────────────────────────────────────────────────
    # Serve index.html for any unknown path so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy → FastAPI backend ──────────────────────────────────────────
    # /api/predict  →  http://backend:8000/predict
    # /api/feedback →  http://backend:8000/feedback
    # /api/health   →  http://backend:8000/health
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow large base64-encoded images in request body
        client_max_body_size 50m;

        # Give the model time to run (CPU inference can take ~1s)
        proxy_read_timeout 60s;
    }

    # ── Cache static assets ──────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
